name: Wodby Node Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: wodby/actions/setup-wodby-cli@v1
        with:
          api-key: ${{ secrets.WODBY_API_KEY }}
          app-service-id: ${{ secrets.WODBY_APP_SERVICE_ID }}
          api-host: ${{ secrets.WODBY_API_HOST }}
          cli-version: 2.0-dev

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Install node modules
        run: npm ci

      - name: Build images
        run: wodby ci build

      - name: Release images
        run: wodby ci release

      - name: Deploy
        run: wodby ci deploy

      # Skip post deployment scripts execution:
      # - name: Deploy without post deployment scripts
      #   run: wodby ci deploy --skip-post-deploy
