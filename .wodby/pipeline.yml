version: 0.1

workflows:
  main:
    jobs:
      - build

jobs:
  build:
    steps:
      - clone

      - cache_restore:
          path: node_modules
          key: 'npm-{{ hash "package-lock.json" }}-v1'

      - run: wget -qO- https://api.wodby.com/v1/get/cli?version=2.0-dev | sh
      - run: wodby ci init $WODBY_BUILD_ID

      - run: wodby ci run -i wodby/node -- npm ci
      - run: wodby ci run -i wodby/node -- npm run build
      - cache_save:
          key: 'npm-{{ hash "package-lock.json" }}-v1'
          path: node_modules

      - name: Debug ownership after init
        run: |
          id
          ls -ld "$GITHUB_WORKSPACE"
          stat -c '%u:%g %a %n' "$GITHUB_WORKSPACE"
          
      - run: wodby ci build --from dist
      - run: wodby ci release
      - run: wodby ci deploy
